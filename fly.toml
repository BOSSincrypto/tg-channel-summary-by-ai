# fly.toml — Fly.io deployment configuration for tg-channel-summary-by-ai
# See: https://fly.io/docs/reference/configuration/

app = "tg-channel-summary"
primary_region = "ams"

[build]
  [build.args]
    GO_VERSION = "1.26"

[env]
  PORT = "8080"
  DB_PATH = "/data/bot.db"

[[mounts]]
  source = "sqlite_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/health"
    grace_period = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
