<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17212b">
  <title>Digest Control</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f8; color: #17212b; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; }
    main { width: min(460px, 100%); padding: 28px; border: 1px solid #d7e0e8; border-radius: 18px; background: #fff; box-shadow: 0 12px 34px rgba(20, 35, 50, .1); text-align: center; }
    .icon { font-size: 38px; }
    h1 { margin: 12px 0 8px; font-size: 26px; }
    p { margin: 0; color: #708090; line-height: 1.5; }
    button { margin-top: 22px; border: 0; border-radius: 11px; padding: 11px 18px; background: #2aabee; color: #fff; font: inherit; font-weight: 800; cursor: pointer; }
    small { display: block; margin-top: 16px; color: #708090; }
  </style>
</head>
<body>
  <main role="alert" aria-live="assertive">
    <div class="icon" aria-hidden="true">⚠️</div>
    <h1>Не удалось загрузить приложение</h1>
    <p>Сервер настроек временно недоступен. Проверьте соединение и повторите попытку.</p>
    <button type="button" id="retry">Повторить</button>
    <small id="details">Ошибка соединения с сервером (connection refused).</small>
  </main>
  <script>
    document.getElementById("retry").addEventListener("click", function () {
      window.location.reload();
    });
  </script>
</body>
</html>
